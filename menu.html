<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</body>
</html>

<style>

    body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0c0684, #ab116e);
  color: #fff;
}

.container {
  padding: 40px;
  text-align: center;
}

h1 {
  margin-bottom: 30px;
  font-size: 2.5em;
}

.menu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
}

.card {
  background: #1e1e1e;
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card h2 {
  margin: 15px 0 5px;
}

.card p {
  font-size: 14px;
  padding: 0 15px;
  color: #ccc;
}

.price {
  display: block;
  margin: 15px;
  font-weight: bold;
  color: #f9c74f;
  font-size: 18px;
}





</style>




<body>

  <div class="container">
    <h1>🍽️ Satayes Menu </h1>

<section class="menu">
  <h2>Our Menu</h2>

  <div class="menu-container">
    <div class="card">
      <h3> <img src="https://thumbs.dreamstime.com/b/mouthwatering-penang-satay-skewers-vibrant-png-images-perfect-food-blogs-websites-recipes-indulge-flavors-386037097.jpg" alt="satay"> Satay Beef</h3>
      <p> Creamy sweet and spicy</p>
        <span class="price"> € 35.00</span>
    </div>

    <div class="card">
      <h3> <img src="https://thehappyfoodie.co.uk/wp-content/uploads/2021/08/chicken-satay-skewers_s900x0_c1050x613_l0x492.png" alt="satay 2"> Satay Chicken</h3>
      <p> With nuts souces and cheese</p>
        <span class="price"> € 15.00</span>
    </div>

    <div class="card">
      <h3> <img src="https://walnutbistronepal.com/wp-content/uploads/2023/11/Chicken-Satay.png" alt="satay 3"> Satay Duck</h3>
      <p> Smoothes of duck grill </p>
        <span class="price"> € 25.00</span>
    </div>
  </div>
</section>

</body>
</html>
