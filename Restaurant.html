<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0c0684, #ab116e);
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: linear-gradient(135deg, #0c0684, #ab116e);
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
  position: sticky;
  top: 0;
  color: aliceblue;
  
}

.navbar h2 {
  font-weight: 800;
  
}

.navbar ul {
  
  display: flex;
  gap: 25px;
  list-style: none;
  
}

.navbar li {
  cursor: pointer;
  font-weight: 600;
  
}

a {
  text-decoration: none;
  color: aliceblue;
}


/* Hero */
.hero {
  height: 90vh;
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
              url('https://assets.pikiran-rakyat.com/crop/0x0:0x0/750x500/photo/2023/06/17/2676489155.png');
  background-size: cover;
  color: aliceblue;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 15px;
  text-align: center;
}

.hero h1 {
  font-size: 50px;
  color: aliceblue;
}

.hero button {
  padding: 12px 25px;
  border: none;
  background: #ff4d4d;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.hero button:hover {
  background: #e60000;
}

/* Menu */
.menu {
  padding: 60px 40px;
  text-align: center;
}

.menu-container {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: linear-gradient(135deg, #0b0584, #bb4479);
  padding: 20px;
  width: 250px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
}

img {
  width: 250px;
  height: 180px ;

}


.card:hover {
  transform: translateY(-8px);
}

/* Contact */
.contact {
  padding: 40px;
  text-align: center;
  background: #222;
  color: white;
}




</style>



<body>

<!-- Navbar -->
<nav class="navbar">
  <h2> Indonesian Restaurant</h2>
  <ul>
    <a href="index.html"><li>Home</li></a>
    <a href="menu.html"><li>Menu</li></a>
    <a href="contact.html"><li>Contact</li></a>
  </ul>
</nav>

<!-- Hero -->
<section class="hero">
  <h1> SATAYES WAW</h1>
  
  <p>Fresh • Tasty • Modern</p>
  <button>Order Now</button>
</section>

<!-- Menu -->
<section class="menu">
  <h2>Our Menu</h2>

  <div class="menu-container">
    <div class="card">
      <h3> <img src="https://thumbs.dreamstime.com/b/mouthwatering-penang-satay-skewers-vibrant-png-images-perfect-food-blogs-websites-recipes-indulge-flavors-386037097.jpg" alt="satay"> Satay Beef</h3>
      <p> Creamy sweet and spicy</p>
    </div>

    <div class="card">
      <h3> <img src="https://thehappyfoodie.co.uk/wp-content/uploads/2021/08/chicken-satay-skewers_s900x0_c1050x613_l0x492.png" alt="satay 2"> Satay Chicken</h3>
      <p> With nuts souces and cheese</p>
    </div>

    <div class="card">
      <h3> <img src="https://walnutbistronepal.com/wp-content/uploads/2023/11/Chicken-Satay.png" alt="satay 3"> Satay Duck</h3>
      <p> Smoothes of duck grill </p>
    </div>
  </div>
</section>

<!-- Contact -->
<section class="contact">
  <h2>Contact Us</h2>
  <p>Email: restaurant@email.com</p>
</section>

</body>
</html>
