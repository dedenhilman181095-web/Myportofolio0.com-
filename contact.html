<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
</head>

</html>

<style>

body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #0c0684, #ab116e);
}

.contact {
  padding: 60px 20px;
   background: linear-gradient(135deg, #0c0684, #ab116e);
  color: white;
  text-align: center;
}

.contact h2 {
  font-size: 2.5rem;
  margin-bottom: 10px;
}

.contact-wrapper {
  display: flex;
  gap: 30px;
  margin-top: 30px;
  justify-content: center;
  flex-wrap: wrap;
}

form {
  display: flex;
  flex-direction: column;
  gap: 15px;
  width: 300px;
}

input, textarea {
  padding: 12px;
  border: none;
  border-radius: 8px;
  outline: none;
}

button {
  padding: 12px;
  background: #38bdf8;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #0ea5e9;
}

.contact-info {
  text-align: left;
}

</style>

<body>
    
<section class="contact">
  <div class="container">
    <h2>Contact Me</h2>
    <p>Let’s work together or just say hello 👋</p>

    <div class="contact-wrapper">
      <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
      </form>

      <div class="contact-info">
        <h3>Get in touch</h3>
        <p>Email: hello@email.com</p>
        <p>Phone: +62 812 3456 7890</p>
        <p>Location: Indonesia</p>
      </div>
    </div>
  </div>
</section>


</body>
